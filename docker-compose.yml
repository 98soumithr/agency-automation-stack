version: "3.8"

# =============================================================================
# Agency Automation Stack — 24/7 Laptop Setup
# Services: n8n + Ollama + OpenOutreach + Postiz + supporting infra
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # 1. n8n — Workflow Orchestration (The Brain)
  # Access: http://localhost:5678
  # ---------------------------------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:-n8n_secret}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change-this-to-a-random-string}
      - GENERIC_TIMEZONE=${TIMEZONE:-America/New_York}
      - N8N_DIAGNOSTICS_ENABLED=false
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - agency-net
    depends_on:
      n8n-postgres:
        condition: service_healthy
    mem_limit: 1g

  n8n-postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: always
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:-n8n_secret}
      POSTGRES_DB: n8n
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    networks:
      - agency-net
    healthcheck:
      test: pg_isready -U n8n -d n8n
      interval: 10s
      timeout: 3s
      retries: 3
    mem_limit: 512m

  # ---------------------------------------------------------------------------
  # 2. Ollama — Local AI (Zero API Cost)
  # API: http://localhost:11434
  # Pull models after start: docker exec ollama ollama pull llama3.1:8b
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agency-net
    # No mem_limit — Ollama needs as much RAM as the model requires

  # ---------------------------------------------------------------------------
  # 3. Open WebUI — ChatGPT-like Interface for Local Models
  # Access: http://localhost:3000
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      - agency-net
    depends_on:
      - ollama
    mem_limit: 1g

  # ---------------------------------------------------------------------------
  # 4. OpenOutreach — LinkedIn Lead Gen + Outreach
  # VNC Viewer: http://localhost:6080/vnc.html
  # VNC Direct: localhost:5900
  # ---------------------------------------------------------------------------
  openoutreach:
    image: ghcr.io/eracle/openoutreach:latest
    container_name: openoutreach
    restart: always
    ports:
      - "5900:5900"
      - "6080:6080"
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-}
      - LLM_API_BASE=${LLM_API_BASE:-}
    volumes:
      - openoutreach_db:/app
    networks:
      - agency-net
    mem_limit: 2g

  # ---------------------------------------------------------------------------
  # 5. Postiz — Social Media Scheduler + AI Content
  # Access: http://localhost:4007
  # ---------------------------------------------------------------------------
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: always
    environment:
      MAIN_URL: "http://localhost:4007"
      FRONTEND_URL: "http://localhost:4007"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:4007/api"
      JWT_SECRET: "${POSTIZ_JWT_SECRET:-change-this-to-random-characters-now}"
      DATABASE_URL: "postgresql://postiz:${POSTIZ_DB_PASSWORD:-postiz_secret}@postiz-postgres:5432/postiz"
      REDIS_URL: "redis://postiz-redis:6379"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      TEMPORAL_ADDRESS: "temporal:7233"
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false"
      RUN_CRON: "true"
      # Storage
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
      # Social Media API Keys (fill these in .env)
      LINKEDIN_CLIENT_ID: "${POSTIZ_LINKEDIN_CLIENT_ID:-}"
      LINKEDIN_CLIENT_SECRET: "${POSTIZ_LINKEDIN_CLIENT_SECRET:-}"
      X_API_KEY: "${POSTIZ_X_API_KEY:-}"
      X_API_SECRET: "${POSTIZ_X_API_SECRET:-}"
      FACEBOOK_APP_ID: "${POSTIZ_FACEBOOK_APP_ID:-}"
      FACEBOOK_APP_SECRET: "${POSTIZ_FACEBOOK_APP_SECRET:-}"
      THREADS_APP_ID: "${POSTIZ_THREADS_APP_ID:-}"
      THREADS_APP_SECRET: "${POSTIZ_THREADS_APP_SECRET:-}"
      REDDIT_CLIENT_ID: "${POSTIZ_REDDIT_CLIENT_ID:-}"
      REDDIT_CLIENT_SECRET: "${POSTIZ_REDDIT_CLIENT_SECRET:-}"
      TIKTOK_CLIENT_ID: "${POSTIZ_TIKTOK_CLIENT_ID:-}"
      TIKTOK_CLIENT_SECRET: "${POSTIZ_TIKTOK_CLIENT_SECRET:-}"
      YOUTUBE_CLIENT_ID: "${POSTIZ_YOUTUBE_CLIENT_ID:-}"
      YOUTUBE_CLIENT_SECRET: "${POSTIZ_YOUTUBE_CLIENT_SECRET:-}"
      PINTEREST_CLIENT_ID: "${POSTIZ_PINTEREST_CLIENT_ID:-}"
      PINTEREST_CLIENT_SECRET: "${POSTIZ_PINTEREST_CLIENT_SECRET:-}"
      DISCORD_CLIENT_ID: "${POSTIZ_DISCORD_CLIENT_ID:-}"
      DISCORD_CLIENT_SECRET: "${POSTIZ_DISCORD_CLIENT_SECRET:-}"
      SLACK_ID: "${POSTIZ_SLACK_ID:-}"
      SLACK_SECRET: "${POSTIZ_SLACK_SECRET:-}"
      # AI
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      # Misc
      NX_ADD_PLUGINS: "false"
      API_LIMIT: "30"
    volumes:
      - postiz_config:/config/
      - postiz_uploads:/uploads/
    ports:
      - "4007:5000"
    networks:
      - agency-net
      - temporal-net
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
    mem_limit: 1g

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTIZ_DB_PASSWORD:-postiz_secret}
      POSTGRES_USER: postiz
      POSTGRES_DB: postiz
    volumes:
      - postiz_postgres_data:/var/lib/postgresql/data
    networks:
      - agency-net
    healthcheck:
      test: pg_isready -U postiz -d postiz
      interval: 10s
      timeout: 3s
      retries: 3
    mem_limit: 512m

  postiz-redis:
    image: redis:7.2-alpine
    container_name: postiz-redis
    restart: always
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz_redis_data:/data
    networks:
      - agency-net
    mem_limit: 256m

  # ---------------------------------------------------------------------------
  # 6. Temporal — Workflow Engine for Postiz Scheduling
  # ---------------------------------------------------------------------------
  temporal-elasticsearch:
    container_name: temporal-elasticsearch
    image: elasticsearch:7.17.27
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - temporal-net
    expose:
      - 9200
    volumes:
      - temporal_es_data:/var/lib/elasticsearch/data
    mem_limit: 512m

  temporal-postgresql:
    container_name: temporal-postgresql
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    networks:
      - temporal-net
    expose:
      - 5432
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data
    mem_limit: 256m

  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.28.1
    ports:
      - "7233:7233"
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    networks:
      - temporal-net
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    mem_limit: 512m

# =============================================================================
# Volumes
# =============================================================================
volumes:
  n8n_data:
  n8n_postgres_data:
  ollama_data:
  open_webui_data:
  openoutreach_db:
  postiz_config:
  postiz_uploads:
  postiz_postgres_data:
  postiz_redis_data:
  temporal_es_data:
  temporal_postgres_data:

# =============================================================================
# Networks
# =============================================================================
networks:
  agency-net:
    driver: bridge
  temporal-net:
    driver: bridge
    name: temporal-network
